<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aveenya AI | High-Fidelity Extraction</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .upload-area.dragging {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            scale: 1.02;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            font-size: 2rem;
        }

        #file-input {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none !important;
        }

        #status {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 12px;
            display: none;
            text-align: center;
        }

        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .preview-pane {
            margin-top: 2rem;
            display: none;
            overflow-x: auto;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th { text-align: left; color: var(--text-dim); padding: 0.5rem; border-bottom: 1px solid var(--border); }
        td { padding: 0.5rem; border-bottom: 1px solid var(--border); }

        .footer-tag {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-dim);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Aveenya AI</h1>
            <p>Intelligence-Driven Invoice Data Extraction</p>
        </div>

        <div class="main-card">
            <div class="upload-area" id="drop-zone">
                <div class="icon-box">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h3>Drop invoice here</h3>
                <p>PDF, JPG, PNG or TIFF (Max 16MB)</p>
                <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.tiff">
            </div>

            <div style="text-align: center;">
                <button class="btn" id="upload-btn">
                    <span>Extract Data</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>

            <div class="loading-spinner" id="loader"></div>
            <div id="status"></div>

            <div class="preview-pane" id="preview">
                <h4 style="margin-bottom: 1rem; color: var(--primary);">Extraction Preview</h4>
                <div id="table-container"></div>
                <div style="margin-top: 1.5rem; text-align: center;">
                    <a id="download-link" href="#" class="btn" style="background: #059669; margin: 0;">Download Full XLSX</a>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-tag">Powered by DeepMind Advanced Models</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const preview = document.getElementById('preview');
        const tableContainer = document.getElementById('table-container');
        const downloadLink = document.getElementById('download-link');

        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.classList.add('dragging');
        };

        dropZone.ondragleave = () => dropZone.classList.remove('dragging');

        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragging');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        };

        function handleFile(file) {
            selectedFile = file;
            dropZone.querySelector('h3').textContent = file.name;
            dropZone.querySelector('p').textContent = `${(file.size / 1024 / 1024).toFixed(2)} MB`;
            status.style.display = 'none';
            preview.style.display = 'none';
        }

        uploadBtn.onclick = async () => {
            if (!selectedFile) {
                showStatus("Please select a file first", "error");
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            uploadBtn.disabled = true;
            loader.style.display = 'block';
            status.style.display = 'none';
            preview.style.display = 'none';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(data.message, "success");
                    renderPreview(data.preview_data);
                    downloadLink.href = data.download_url;
                    preview.style.display = 'block';
                } else {
                    showStatus(data.error || "System Error", "error");
                }
            } catch (err) {
                showStatus("Connection refused by local server. Make sure app.py is running.", "error");
            } finally {
                uploadBtn.disabled = false;
                loader.style.display = 'none';
            }
        };

        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = type;
            status.style.display = 'block';
        }

        function renderPreview(data) {
            if (!data || data.length === 0) return;
            
            let html = '<table><thead><tr>';
            const headers = Object.keys(data[0]);
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            
            data.forEach(row => {
                html += '<tr>';
                headers.forEach(h => html += `<td>${row[h] || ''}</td>`);
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            tableContainer.innerHTML = html;
        }
    </script>
</body>
</html>
